[project]
name = "ice-cup-sgl"
version = "0.5.6+cu128"
requires-python = ">=3.10"
license = { file = "../LICENSE" }
dependencies = [
    "flashinfer-cubin==0.5.3",
    "flashinfer-python==0.5.3",
    "flashinfer-jit-cache==0.5.3+cu128",
    "torch==2.9.1",
    "sglang==0.5.6",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128" },
]
flashinfer-jit-cache = [
    { index = "flashinfer-cu128" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "flashinfer-cu128"
url = "https://flashinfer.ai/whl/cu128"
explicit = true

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
